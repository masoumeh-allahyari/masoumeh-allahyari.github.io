<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وب‌سایت شخصی معصومه</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 { color: #4a90e2; margin-bottom: 10px; }
        p { color: #666; line-height: 1.6; }
        .social-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 25px;
            background-color: #4a90e2;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: 0.3s;
        }
        .social-btn:hover { background-color: #357abd; }
    </style>
</head>
<body>
    <div class="container">
        <h1>سلام، من معصومه هستم! 👋</h1>
        <p>به وب‌سایت شخصی من خوش آمدید. این سایت با گیت‌هاب هاست شده و در حال تکمیل شدن است.</p>
        <a href="#" class="social-btn">مشاهده نمونه کارها</a>
    </div>
</body>
</html>
